<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />

  <title>송금 요청</title>

  <meta property="og:title" content="송금 요청" />
  <meta property="og:description" content="송금 요청 링크입니다. 금액과 사유를 확인하고 송금해주세요." />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="송금 요청" />
  <meta name="twitter:description" content="송금 요청 링크입니다." />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
      background: #f4f7fb;
    }

    body {
      width: 100%;
      min-width: 320px;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background:
        radial-gradient(circle at top left, rgba(76, 154, 255, 0.16), transparent 34%),
        linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      color: #172033;
    }

    .page {
      width: 100%;
      min-height: 100dvh;
      padding: max(18px, env(safe-area-inset-top)) 14px max(22px, env(safe-area-inset-bottom));
    }

    .wrap {
      width: min(100%, 430px);
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(214, 225, 238, 0.9);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(49, 72, 105, 0.12);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      color: #2563eb;
      font-weight: 900;
      font-size: 15px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 950;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.22);
    }

    h1 {
      margin: 0 0 9px;
      font-size: 25px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: #64748b;
      line-height: 1.58;
      font-size: 15px;
    }

    label {
      display: block;
      margin: 15px 0 7px;
      font-weight: 850;
      font-size: 14px;
      color: #334155;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #dce6f2;
      border-radius: 16px;
      padding: 0 15px;
      font-size: 16px;
      outline: none;
      background: #fbfdff;
      color: #111827;
    }

    input,
    select {
      height: 52px;
    }

    textarea {
      height: 52px;
      min-height: 52px;
      max-height: 96px;
      padding-top: 13px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #7fb1ff;
      box-shadow: 0 0 0 4px rgba(76, 154, 255, 0.15);
      background: #ffffff;
    }

    button,
    a.button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      display: grid;
      place-items: center;
      text-decoration: none;
      padding: 0 15px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.2);
    }

    button:active,
    a.button:active {
      transform: translateY(1px);
    }

    .mode-tabs,
    .person-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0 8px;
    }

    .mode-tabs button,
    .person-buttons button {
      background: #f3f7fc;
      color: #334155;
      border: 1px solid #dde8f5;
      box-shadow: none;
    }

    .mode-tabs button.active,
    .person-buttons button.active {
      background: #eaf3ff;
      color: #1d4ed8;
      border-color: #9fc8ff;
    }

    .primary {
      margin-top: 18px;
    }

    .sub {
      background: #f7faff;
      color: #1e293b;
      border: 1px solid #dbe6f3;
      box-shadow: none;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .amount-area {
      margin: 24px 0 18px;
      padding: 16px 0;
    }

    .money {
      font-size: 43px;
      font-weight: 950;
      margin: 20px 0 6px;
      letter-spacing: 0;
      word-break: break-word;
    }

    .summary,
    .account-box,
    .more-box,
    .expired-box,
    .reason-box,
    .ai-box,
    .group-list {
      background: #f8fbff;
      border: 1px solid #e3ecf6;
      border-radius: 18px;
      padding: 15px;
      margin-top: 16px;
      color: #475569;
      line-height: 1.65;
      font-size: 14px;
      word-break: break-word;
    }

    .ai-box {
      background: #f7fbff;
    }

    .ai-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: #172033;
      font-weight: 900;
    }

    .ai-button {
      width: auto;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: none;
    }

    .reason-box strong {
      display: block;
      margin-bottom: 4px;
      color: #172033;
    }

    .expired-box {
      background: #fff7ed;
      border-color: #fed7aa;
      color: #9a3412;
      font-weight: 800;
    }

    .account-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .account-row strong {
      color: #111827;
      font-size: 16px;
    }

    .mini-button {
      width: auto;
      min-height: 40px;
      border-radius: 13px;
      padding: 0 14px;
      font-size: 13px;
      background: #eef5ff;
      color: #1d4ed8;
      border: 1px solid #c7dcff;
      white-space: nowrap;
      box-shadow: none;
    }

    .safe {
      margin-top: 14px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }

    .more-toggle {
      margin-top: 12px;
      background: #ffffff;
      color: #1e293b;
      border: 1px solid #dbe6f3;
      box-shadow: none;
    }

    .bank-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .bank-button {
      min-height: 62px;
      background: #ffffff;
      color: #111827;
      border: 1px solid #dbe6f3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 16px;
      font-weight: 900;
      box-shadow: 0 8px 20px rgba(49, 72, 105, 0.07);
    }

    .bank-button span {
      color: #2563eb;
      font-size: 13px;
      font-weight: 850;
    }

    .hint {
      margin-top: 7px;
      color: #7c8ca3;
      font-size: 12px;
      line-height: 1.45;
    }

    .group-row {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 8px;
      margin-top: 10px;
    }

    .group-row input {
      height: 48px;
      border-radius: 14px;
    }

    .group-item {
      display: grid;
      gap: 8px;
      padding: 12px 0;
      border-top: 1px solid #e3ecf6;
    }

    .group-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .group-item strong {
      color: #172033;
    }

    .group-item .actions {
      margin-top: 0;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 0.2px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 360px) {
      .wrap {
        padding: 20px;
        border-radius: 20px;
      }

      h1 {
        font-size: 23px;
      }

      .money {
        font-size: 36px;
      }

      .actions,
      .group-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="wrap">
      <div class="brand">
        <div class="logo">₩</div>
        <span>간편 송금 요청</span>
      </div>

      <section id="maker">
        <h1>송금 링크 만들기</h1>
        <p>개인 또는 단체 송금 요청 링크를 만들 수 있습니다.</p>

        <div class="mode-tabs">
          <button id="singleModeBtn" class="active" onclick="setMode('single')">개인</button>
          <button id="groupModeBtn" onclick="setMode('group')">단체</button>
        </div>

        <div class="person-buttons">
          <button id="parkBtn" class="active" onclick="setPerson('park')">ritual</button>
          <button id="jangBtn" onclick="setPerson('jang')">장우영</button>
        </div>

        <label for="receiverName">받는 사람 이름</label>
        <select id="receiverName">
          <option value="0" selected>ritual</option>
          <option value="1">장우영</option>
        </select>

        <label for="bank">은행명</label>
        <select id="bank">
          <option value="0" selected>토스뱅크</option>
        </select>

        <label for="account">계좌번호</label>
        <select id="account">
          <option value="0" selected>100257070784</option>
          <option value="1">100167624090</option>
        </select>

        <div id="singleFields">
          <label for="payerName">보낼 사람 이름</label>
          <input id="payerName" placeholder="예: 김민수" />

          <label for="amount">받을 금액</label>
          <input id="amount" type="text" inputmode="text" placeholder="예: 15000 또는 10000+5000=" />
          <div class="hint">수식 끝에 = 를 붙이면 자동 계산됩니다.</div>
        </div>

        <div id="groupFields" class="hidden">
          <label for="groupCount">몇 명에게 받을까요?</label>
          <input id="groupCount" type="number" inputmode="numeric" min="1" max="20" value="3" onchange="renderGroupRows()" />
          <div id="groupRows"></div>
        </div>

        <label for="reason">송금 사유</label>
        <textarea id="reason" placeholder="예: 치킨"></textarea>

        <div class="ai-box">
          <div class="ai-title">
            <span>자동문구</span>
            <button class="ai-button" onclick="generateAiMessage()">생성</button>
          </div>
          <textarea id="aiMessage" placeholder="사유와 금액을 보고 자동으로 문구를 만들어줍니다."></textarea>
        </div>

        <button class="primary" onclick="makeLink()">링크 만들기</button>

        <div id="result" class="summary hidden"></div>
        <div id="groupResult" class="group-list hidden"></div>

        <div id="shareActions" class="actions hidden">
          <button class="sub" onclick="copyLink()">링크 복사</button>
          <button onclick="shareLink()">공유하기</button>
        </div>
      </section>

      <section id="payer" class="hidden">
        <h1 id="payTitle">송금해주세요</h1>
        <p id="payText"></p>

        <div class="amount-area">
          <div class="money" id="payAmount"></div>
          <a id="tossLink" class="button primary" href="#" target="_self">토스로 바로 송금</a>
        </div>

        <div id="payReasonBox" class="reason-box hidden">
          <strong>요청 문구</strong>
          <span id="payReason"></span>
        </div>

        <div class="account-box">
          토스 앱이 열리지 않으면 아래 계좌로 송금해주세요.
          <div class="account-row">
            <strong id="fallbackAccount"></strong>
            <button class="mini-button" onclick="copyAccount()">복사</button>
          </div>
        </div>

        <button class="more-toggle" onclick="toggleMoreBanks()">더보기</button>

        <div id="moreBanks" class="more-box hidden">
          원하는 은행 앱을 열면 계좌번호가 자동으로 복사됩니다.
          <div class="bank-grid">
            <button class="bank-button" onclick="openBankApp('kakao')">카카오뱅크 <span>앱 열기</span></button>
            <button class="bank-button" onclick="openBankApp('nh')">농협은행 <span>앱 열기</span></button>
            <button class="bank-button" onclick="openBankApp('hana')">하나은행 <span>앱 열기</span></button>
            <button class="bank-button" onclick="openBankApp('shinhan')">신한은행 <span>앱 열기</span></button>
            <button class="bank-button" onclick="openBankApp('kb')">국민은행 <span>앱 열기</span></button>
            <button class="bank-button" onclick="openBankApp('woori')">우리은행 <span>앱 열기</span></button>
          </div>
        </div>

        <div class="safe">
          금액과 받는 사람 정보를 확인하고 송금해주세요. 이 링크는 생성 후 24시간 동안만 열립니다.
        </div>
      </section>

      <section id="expired" class="hidden">
        <h1>만료된 링크입니다</h1>
        <div class="expired-box">
          이 송금 요청 링크는 생성 후 24시간이 지나 만료되었습니다.
        </div>
      </section>

      <div class="footer">made by ritual</div>
    </main>
  </div>

  <script>
    const EXPIRE_MS = 24 * 60 * 60 * 1000;

    const people = [
      { name: "ritual", bank: "토스뱅크", account: "100257070784" },
      { name: "장우영", bank: "토스뱅크", account: "100167624090" }
    ];

    const bankApps = {
      kakao: { name: "카카오뱅크", schemes: ["kakaobank://send", "kakaobank://transfer", "kakaobank://"] },
      nh: { name: "농협은행", schemes: ["nhsmartbanking://", "nhbank://", "nonghyup://"] },
      hana: { name: "하나은행", schemes: ["hanabank://", "hana1qbank://", "hanabanking://"] },
      shinhan: { name: "신한은행", schemes: ["shinhan-sbank://", "sol://", "shinhanbank://"] },
      kb: { name: "국민은행", schemes: ["kbbank://", "kb-bank://", "liivbank://"] },
      woori: { name: "우리은행", schemes: ["wooribank://", "newsmartpib://", "com.wooribank.smart.npib://"] }
    };

    const maker = document.getElementById("maker");
    const payer = document.getElementById("payer");
    const expired = document.getElementById("expired");
    const amountInput = document.getElementById("amount");

    let mode = "single";
    let currentReceiver = null;
    let currentAmount = "";
    let currentReason = "";
    let currentPayerName = "";

    amountInput.addEventListener("input", () => maybeCalculateInput(amountInput));

    function setMode(nextMode) {
      mode = nextMode;
      document.getElementById("singleModeBtn").classList.toggle("active", mode === "single");
      document.getElementById("groupModeBtn").classList.toggle("active", mode === "group");
      document.getElementById("singleFields").classList.toggle("hidden", mode !== "single");
      document.getElementById("groupFields").classList.toggle("hidden", mode !== "group");
      document.getElementById("shareActions").classList.add("hidden");
      document.getElementById("result").classList.add("hidden");
      document.getElementById("groupResult").classList.add("hidden");

      if (mode === "group") {
        renderGroupRows();
      }
    }

    function renderGroupRows() {
      const count = Math.min(Math.max(Number(document.getElementById("groupCount").value) || 1, 1), 20);
      const groupRows = document.getElementById("groupRows");
      const oldValues = Array.from(groupRows.querySelectorAll(".group-row")).map(row => ({
        name: row.querySelector(".group-name").value,
        amount: row.querySelector(".group-amount").value
      }));

      groupRows.innerHTML = "";

      for (let i = 0; i < count; i++) {
        const row = document.createElement("div");
        row.className = "group-row";
        row.innerHTML = `
          <input class="group-name" placeholder="${i + 1}번 이름" value="${escapeAttribute(oldValues[i]?.name || "")}" />
          <input class="group-amount" type="text" inputmode="text" placeholder="금액" value="${escapeAttribute(oldValues[i]?.amount || "")}" />
        `;
        groupRows.appendChild(row);
      }

      groupRows.querySelectorAll(".group-amount").forEach(input => {
        input.addEventListener("input", () => maybeCalculateInput(input));
      });
    }

    function maybeCalculateInput(input) {
      const value = input.value.trim();
      if (value.endsWith("=")) {
        const expression = value.slice(0, -1).replaceAll(",", "");
        try {
          const result = calculateExpression(expression);
          if (Number.isFinite(result) && result >= 0) {
            input.value = String(Math.round(result));
          }
        } catch {}
      }
    }

    function calculateExpression(expression) {
      if (!/^[0-9+\-*/().\s]+$/.test(expression)) {
        throw new Error("invalid expression");
      }
      return Function('"use strict"; return (' + expression + ')')();
    }

    function normalizeAmount(value) {
      const clean = value.replaceAll(",", "").trim();
      if (clean.endsWith("=")) {
        return String(Math.round(calculateExpression(clean.slice(0, -1))));
      }
      if (/^[0-9+\-*/().\s]+$/.test(clean) && /[+\-*/]/.test(clean)) {
        return String(Math.round(calculateExpression(clean)));
      }
      return clean;
    }

    function encodeData(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      bytes.forEach(byte => { binary += String.fromCharCode(byte); });
      return btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
    }

    function decodeData(text) {
      text = text.replaceAll("-", "+").replaceAll("_", "/");
      while (text.length % 4) { text += "="; }
      const binary = atob(text);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return new TextDecoder().decode(bytes);
    }

    function setPerson(person) {
      const receiverName = document.getElementById("receiverName");
      const account = document.getElementById("account");
      const parkBtn = document.getElementById("parkBtn");
      const jangBtn = document.getElementById("jangBtn");

      if (person === "jang") {
        receiverName.value = "1";
        account.value = "1";
        jangBtn.classList.add("active");
        parkBtn.classList.remove("active");
      } else {
        receiverName.value = "0";
        account.value = "0";
        parkBtn.classList.add("active");
        jangBtn.classList.remove("active");
      }
    }

    function formatWon(amount) {
      return Number(amount).toLocaleString("ko-KR") + "원";
    }

    function generateMessage(reason, amount, payerName = "") {
      const cleanReason = (reason || "정산금").trim();
      const amountText = amount ? formatWon(amount) : "정산금";
      const namePart = payerName ? `${payerName}, ` : "";
      const lowered = cleanReason.toLowerCase();

      if (cleanReason.includes("치킨")) return `${namePart}어제 치킨 진짜 맛있었지. 치킨값 ${amountText} 빨리 보내줘`;
      if (cleanReason.includes("밥") || cleanReason.includes("저녁") || cleanReason.includes("점심")) return `${namePart}${cleanReason} 맛있게 먹었으니까 ${amountText} 보내주세요`;
      if (cleanReason.includes("택시") || cleanReason.includes("차비")) return `${namePart}그때 같이 탄 ${cleanReason} ${amountText} 보내주세요`;
      if (cleanReason.includes("술") || cleanReason.includes("맥주") || cleanReason.includes("소주")) return `${namePart}즐거웠던 만큼 정산도 깔끔하게. ${cleanReason} ${amountText} 보내줘`;
      if (cleanReason.includes("회비") || cleanReason.includes("모임")) return `${namePart}${cleanReason} ${amountText} 보내주세요. 정산 마감 전에 부탁드립니다`;
      if (lowered.includes("netflix") || cleanReason.includes("넷플") || cleanReason.includes("구독")) return `${namePart}${cleanReason} 이번 달 몫 ${amountText} 보내주세요`;
      return `${namePart}${cleanReason} ${amountText} 보내주세요`;
    }

    function generateAiMessage() {
      const reason = document.getElementById("reason").value.trim();
      const payerName = document.getElementById("payerName").value.trim();
      let amount = "";

      try {
        if (mode === "single") {
          amount = normalizeAmount(document.getElementById("amount").value.trim());
        } else {
          const firstAmount = document.querySelector(".group-amount")?.value.trim() || "";
          amount = normalizeAmount(firstAmount);
        }
      } catch {
        amount = "";
      }
      document.getElementById("aiMessage").value = generateMessage(reason, amount, payerName);
    }

    function makeTossUrl(amount, bank, account, reason) {
      return `supertoss://send?amount=${encodeURIComponent(amount)}&bank=${encodeURIComponent(bank)}&accountNo=${encodeURIComponent(account)}&memo=${encodeURIComponent(reason || "")}&origin=link`;
    }

    function showExpired() {
      maker.classList.add("hidden");
      payer.classList.add("hidden");
      expired.classList.remove("hidden");
      document.title = "만료된 송금 요청";
    }

    function openPaymentPage() {
      const hash = location.hash.replace("#p=", "").replace("#", "");
      if (!hash) return;

      try {
        const data = JSON.parse(decodeData(hash));
        const receiver = people[Number(data.receiverIndex)];

        if (!receiver || !data.amount || !data.createdAt || !data.payerName) return;

        if (Date.now() - Number(data.createdAt) > EXPIRE_MS) {
          showExpired();
          return;
        }

        currentReceiver = receiver;
        currentAmount = data.amount;
        currentReason = data.message || data.reason || "";
        currentPayerName = data.payerName;

        maker.classList.add("hidden");
        payer.classList.remove("hidden");

        const amountText = formatWon(data.amount);
        document.title = `${data.payerName}님 ${amountText} 송금 요청`;
        document.getElementById("payTitle").textContent = `${data.payerName}님에게 송금해주세요`;
        document.getElementById("payText").textContent = `${receiver.name}에게 ${amountText}을 보내주세요.`;
        document.getElementById("payAmount").textContent = amountText;
        document.getElementById("fallbackAccount").textContent = `${receiver.bank} ${receiver.account}`;

        if (currentReason) {
          document.getElementById("payReasonBox").classList.remove("hidden");
          document.getElementById("payReason").textContent = currentReason;
        }

        document.getElementById("tossLink").setAttribute("href", makeTossUrl(data.amount, receiver.bank, receiver.account, currentReason));
      } catch {
        alert("송금 링크가 올바르지 않습니다.");
      }
    }

    function makeLink() {
      if (mode === "group") {
        makeGroupLinks();
        return;
      }

      const payerName = document.getElementById("payerName").value.trim();
      const receiverIndex = document.getElementById("receiverName").value;
      const amountRaw = document.getElementById("amount").value.trim();
      const reason = document.getElementById("reason").value.trim();
      let message = document.getElementById("aiMessage").value.trim();
      let amount = "";

      try { amount = normalizeAmount(amountRaw); } catch { alert("금액 수식을 확인해주세요."); return; }

      if (!payerName || !amount || Number(amount) <= 0) {
        alert("보낼 사람 이름과 금액을 입력해주세요.");
        return;
      }

      amount = String(Math.round(Number(amount)));
      document.getElementById("amount").value = amount;

      if (!message) {
        message = generateMessage(reason, amount, payerName);
        document.getElementById("aiMessage").value = message;
      }

      const amountText = formatWon(amount);
      const receiver = people[Number(receiverIndex)];

      window.createdLink = makePayLink({ receiverIndex, amount, createdAt: Date.now(), payerName, reason, message });
      window.shareTitle = `${payerName}님 ${amountText} 송금 요청`;
      window.shareText = message;

      const result = document.getElementById("result");
      result.classList.remove("hidden");
      result.innerHTML = `<strong>${payerName}님 ${amountText} 송금 요청</strong><br>${receiver.name}에게 보내는 링크가 만들어졌습니다.<br>${escapeHtml(message)}<br><br>${window.createdLink}`;

      document.getElementById("groupResult").classList.add("hidden");
      document.getElementById("shareActions").classList.remove("hidden");
    }

    function makeGroupLinks() {
      const receiverIndex = document.getElementById("receiverName").value;
      const reason = document.getElementById("reason").value.trim();
      const rows = Array.from(document.querySelectorAll(".group-row"));
      const items = [];

      for (const row of rows) {
        const payerName = row.querySelector(".group-name").value.trim();
        const rawAmount = row.querySelector(".group-amount").value.trim();

        if (!payerName && !rawAmount) continue;
        let amount = "";
        try { amount = normalizeAmount(rawAmount); } catch { alert(`${payerName || "이름 없는 항목"} 금액 수식을 확인해주세요.`); return; }

        if (!payerName || !amount || Number(amount) <= 0) {
          alert("단체 항목에는 이름과 금액이 모두 필요합니다.");
          return;
        }

        amount = String(Math.round(Number(amount)));
        const message = generateMessage(reason, amount, payerName);
        const link = makePayLink({ receiverIndex, amount, createdAt: Date.now(), payerName, reason, message });
        items.push({ payerName, amount, message, link });
      }

      if (!items.length) {
        alert("단체로 받을 사람을 한 명 이상 입력해주세요.");
        return;
      }

      window.groupLinks = items;
      const groupResult = document.getElementById("groupResult");
      groupResult.classList.remove("hidden");
      groupResult.innerHTML = items.map((item, index) => `
        <div class="group-item">
          <strong>${escapeHtml(item.payerName)} · ${formatWon(item.amount)}</strong>
          <div>${escapeHtml(item.message)}</div>
          <div>${item.link}</div>
          <div class="actions">
            <button class="sub group-copy" data-index="${index}">복사</button>
            <button class="group-share" data-index="${index}">공유</button>
          </div>
        </div>
      `).join("");

      groupResult.querySelectorAll(".group-copy").forEach(button => {
        button.addEventListener("click", () => {
          const item = window.groupLinks[Number(button.dataset.index)];
          copySpecificLink(item.link);
        });
      });

      groupResult.querySelectorAll(".group-share").forEach(button => {
        button.addEventListener("click", () => {
          const item = window.groupLinks[Number(button.dataset.index)];
          shareSpecificLink(item.payerName, item.message, item.link);
        });
      });

      document.getElementById("result").classList.add("hidden");
      document.getElementById("shareActions").classList.add("hidden");
    }

    function makePayLink(data) {
      return location.origin + location.pathname + "#p=" + encodeData(JSON.stringify(data));
    }

    function escapeHtml(text) {
      return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replaceAll("`", "&#096;");
    }

    async function copyText(text, successMessage, silent = false) {
      try {
        await navigator.clipboard.writeText(text);
        if (!silent) alert(successMessage);
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        try {
          document.execCommand("copy");
          if (!silent) alert(successMessage);
        } catch {
          if (!silent) alert("복사가 안 되면 내용을 길게 눌러 직접 복사해주세요.");
        }
        textarea.remove();
      }
    }

    async function copyLink() {
      if (!window.createdLink) { alert("먼저 송금 링크를 만들어주세요."); return; }
      await copyText(window.createdLink, "링크가 복사되었습니다.");
    }

    async function copySpecificLink(link) {
      await copyText(link, "링크가 복사되었습니다.");
    }

    async function copyAccount(silent = false) {
      if (!currentReceiver) { alert("계좌 정보를 불러오지 못했습니다."); return; }
      await copyText(currentReceiver.account, "계좌번호가 복사되었습니다.", silent);
    }

    async function shareLink() {
      if (!window.createdLink) { alert("먼저 송금 링크를 만들어주세요."); return; }
      await sharePayload(window.shareTitle, window.shareText, window.createdLink);
    }

    async function shareSpecificLink(payerName, message, link) {
      await sharePayload(`${payerName}님 송금 요청`, message, link);
    }

    async function sharePayload(title, text, url) {
      if (navigator.share) {
        try { await navigator.share({ title, text, url }); } catch {}
      } else {
        await copyText(url, "링크가 복사되었습니다.");
      }
    }

    function toggleMoreBanks() {
      document.getElementById("moreBanks").classList.toggle("hidden");
    }

    function openBankApp(bankKey) {
      if (!currentReceiver) { alert("계좌 정보를 불러오지 못했습니다."); return; }
      const app = bankApps[bankKey];
      if (!app) return;

      let opened = false;
      const onHidden = () => {
        if (document.hidden) {
          opened = true;
          copyAccount(true);
        }
      };

      document.addEventListener("visibilitychange", onHidden);

      app.schemes.forEach((scheme, index) => {
        setTimeout(() => { if (!opened) location.href = scheme; }, index * 450);
      });

      setTimeout(() => {
        document.removeEventListener("visibilitychange", onHidden);
        if (!opened) alert(`${app.name} 앱을 열지 못했습니다. 계좌번호는 복사해두었습니다.`);
      }, 2600);
    }

    setPerson("park");
    renderGroupRows();
    openPaymentPage();
  </script>
</body>
</html>
