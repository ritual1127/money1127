<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="format-detection" content="telephone=no" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />

  <title>송금 요청</title>

  <meta property="og:title" content="송금 요청" />
  <meta property="og:description" content="송금 요청 링크입니다." />
  <meta property="og:image" content="https://www.naver1.cloud/og-image-mobile.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="1200" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="송금 요청" />
  <meta name="twitter:description" content="송금 요청 링크입니다." />
  <meta name="twitter:image" content="https://www.naver1.cloud/og-image-mobile.png" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body {
      width: 100%;
      min-width: 320px;
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      overscroll-behavior: none;
      background: #f6f8fb;
      color: #111827;
      display: grid;
      place-items: start center;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
    }

    .wrap {
      width: min(100%, 430px);
      min-height: calc(100svh - 28px);
      background: #ffffff;
      border: 1px solid #e5eaf1;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      color: #2563eb;
      font-weight: 900;
      font-size: 15px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 25px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 20px;
      color: #64748b;
      line-height: 1.55;
      font-size: 15px;
    }

    label {
      display: block;
      margin: 15px 0 7px;
      font-weight: 800;
      font-size: 14px;
      color: #334155;
    }

    input,
    select {
      width: 100%;
      height: 49px;
      border: 1px solid #dbe3ef;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
      background: #ffffff;
      color: #111827;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.11);
    }

    button,
    a.button {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      display: grid;
      place-items: center;
      text-decoration: none;
      padding: 0 14px;
      text-align: center;
    }

    .person-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0 8px;
    }

    .person-buttons button {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #e2e8f0;
    }

    .person-buttons button.active {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #93c5fd;
    }

    .primary {
      margin-top: 18px;
    }

    .sub {
      background: #f8fafc;
      color: #1e293b;
      border: 1px solid #dbe3ef;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .money {
      font-size: 38px;
      font-weight: 950;
      margin: 20px 0 6px;
      letter-spacing: 0;
    }

    .summary,
    .account-box,
    .more-box,
    .expired-box {
      background: #f8fafc;
      border: 1px solid #e5eaf1;
      border-radius: 14px;
      padding: 15px;
      margin-top: 16px;
      color: #475569;
      line-height: 1.65;
      font-size: 14px;
      word-break: break-all;
    }

    .expired-box {
      background: #fff7ed;
      border-color: #fed7aa;
      color: #9a3412;
      font-weight: 800;
    }

    .account-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .account-row strong {
      color: #111827;
      font-size: 16px;
    }

    .mini-button {
      width: auto;
      min-height: 38px;
      border-radius: 10px;
      padding: 0 13px;
      font-size: 13px;
      background: #eef2ff;
      color: #1d4ed8;
      border: 1px solid #c7d2fe;
      white-space: nowrap;
    }

    .safe {
      margin-top: 14px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }

    .more-toggle {
      margin-top: 12px;
      background: #ffffff;
      color: #1e293b;
      border: 1px solid #dbe3ef;
    }

    .bank-grid {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .bank-button {
      min-height: 46px;
      background: #ffffff;
      color: #111827;
      border: 1px solid #dbe3ef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      font-weight: 850;
    }

    .bank-button span {
      color: #64748b;
      font-size: 12px;
      font-weight: 750;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 0.2px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 360px) {
      .wrap {
        padding: 20px;
      }

      h1 {
        font-size: 23px;
      }

      .money {
        font-size: 34px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="brand">
      <div class="logo">₩</div>
      <span>간편 송금 요청</span>
    </div>

    <section id="maker">
      <h1>송금 링크 만들기</h1>
      <p>받는 사람과 보내는 사람 이름, 금액을 입력하면 하루 동안만 열리는 공유 링크가 만들어집니다.</p>

      <div class="person-buttons">
        <button id="parkBtn" class="active" onclick="setPerson('park')">박○○</button>
        <button id="jangBtn" onclick="setPerson('jang')">장○○</button>
      </div>

      <label for="payerName">송금할 사람 이름</label>
      <input id="payerName" placeholder="예: 김민수" />

      <label for="receiverName">받는 사람 이름</label>
      <select id="receiverName">
        <option value="0" selected>박○○</option>
        <option value="1">장○○</option>
      </select>

      <label for="bank">은행명</label>
      <select id="bank">
        <option value="0" selected>토스뱅크</option>
      </select>

      <label for="account">계좌번호</label>
      <select id="account">
        <option value="0" selected>100257070784</option>
        <option value="1">100167624090</option>
      </select>

      <label for="amount">받을 금액</label>
      <input id="amount" type="number" inputmode="numeric" placeholder="예: 15000" />

      <button class="primary" onclick="makeLink()">송금 링크 만들기</button>

      <div id="result" class="summary hidden"></div>

      <div id="shareActions" class="actions hidden">
        <button class="sub" onclick="copyLink()">링크 복사</button>
        <button onclick="shareLink()">공유하기</button>
      </div>
    </section>

    <section id="payer" class="hidden">
      <h1 id="payTitle">송금해주세요</h1>
      <p id="payText"></p>

      <div class="money" id="payAmount"></div>

      <a id="tossLink" class="button primary" href="#" target="_self">토스로 바로 송금</a>

      <div class="account-box">
        토스 앱이 열리지 않으면 아래 계좌로 송금해주세요.

        <div class="account-row">
          <strong id="fallbackAccount"></strong>
          <button class="mini-button" onclick="copyAccount()">복사</button>
        </div>
      </div>

      <button class="more-toggle" onclick="toggleMoreBanks()">다른 은행 앱으로 송금</button>

      <div id="moreBanks" class="more-box hidden">
        계좌번호를 복사한 뒤 원하는 은행 앱을 열어 송금해주세요.

        <div class="bank-grid">
          <button class="bank-button" onclick="openBankApp('nh')">
            농협은행
            <span>앱 열기</span>
          </button>

          <button class="bank-button" onclick="openBankApp('hana')">
            하나은행
            <span>앱 열기</span>
          </button>

          <button class="bank-button" onclick="openBankApp('shinhan')">
            신한은행
            <span>앱 열기</span>
          </button>

          <button class="bank-button" onclick="openBankApp('kb')">
            국민은행
            <span>앱 열기</span>
          </button>

          <button class="bank-button" onclick="openBankApp('woori')">
            우리은행
            <span>앱 열기</span>
          </button>
        </div>
      </div>

      <div class="safe">
        금액과 받는 사람 정보를 확인한 뒤 송금해주세요. 이 링크는 생성 후 24시간 동안만 열립니다.
      </div>
    </section>

    <section id="expired" class="hidden">
      <h1>만료된 링크입니다</h1>
      <div class="expired-box">
        이 송금 요청 링크는 생성 후 24시간이 지나 만료되었습니다.
      </div>
    </section>

    <div class="footer">made by ritual</div>
  </main>

  <script>
    const EXPIRE_MS = 24 * 60 * 60 * 1000;

    const people = [
      { name: "박○○", bank: "토스뱅크", account: "100257070784" },
      { name: "장○○", bank: "토스뱅크", account: "100167624090" }
    ];

    const bankApps = {
      nh: {
        name: "농협은행",
        schemes: ["nhsmartbanking://", "nhbank://", "nonghyup://"]
      },
      hana: {
        name: "하나은행",
        schemes: ["hanabank://", "hana1qbank://", "hanabanking://"]
      },
      shinhan: {
        name: "신한은행",
        schemes: ["shinhan-sbank://", "sol://", "shinhanbank://"]
      },
      kb: {
        name: "국민은행",
        schemes: ["kbbank://", "kb-bank://", "liivbank://"]
      },
      woori: {
        name: "우리은행",
        schemes: ["wooribank://", "newsmartpib://", "com.wooribank.smart.npib://"]
      }
    };

    const maker = document.getElementById("maker");
    const payer = document.getElementById("payer");
    const expired = document.getElementById("expired");

    let currentReceiver = null;
    let currentAmount = "";

    function encodeData(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";

      bytes.forEach(byte => {
        binary += String.fromCharCode(byte);
      });

      return btoa(binary)
        .replaceAll("+", "-")
        .replaceAll("/", "_")
        .replaceAll("=", "");
    }

    function decodeData(text) {
      text = text.replaceAll("-", "+").replaceAll("_", "/");

      while (text.length % 4) {
        text += "=";
      }

      const binary = atob(text);
      const bytes = new Uint8Array(binary.length);

      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }

      return new TextDecoder().decode(bytes);
    }

    function setPerson(person) {
      const receiverName = document.getElementById("receiverName");
      const account = document.getElementById("account");
      const parkBtn = document.getElementById("parkBtn");
      const jangBtn = document.getElementById("jangBtn");

      if (person === "jang") {
        receiverName.value = "1";
        account.value = "1";
        jangBtn.classList.add("active");
        parkBtn.classList.remove("active");
      } else {
        receiverName.value = "0";
        account.value = "0";
        parkBtn.classList.add("active");
        jangBtn.classList.remove("active");
      }
    }

    function makeTossUrl(amount, bank, account) {
      return `supertoss://send?amount=${encodeURIComponent(amount)}` +
        `&bank=${encodeURIComponent(bank)}` +
        `&accountNo=${encodeURIComponent(account)}` +
        `&origin=link`;
    }

    function showExpired() {
      maker.classList.add("hidden");
      payer.classList.add("hidden");
      expired.classList.remove("hidden");
      document.title = "만료된 송금 요청";
    }

    function openPaymentPage() {
      const hash = location.hash.replace("#", "");
      if (!hash) return;

      try {
        const parts = decodeData(hash).split("|");

        const receiverIndex = Number(parts[0]);
        const amount = parts[1];
        const createdAt = Number(parts[2]);
        const payerName = parts.slice(3).join("|");
        const receiver = people[receiverIndex];

        if (!receiver || !amount || !createdAt || !payerName) return;

        if (Date.now() - createdAt > EXPIRE_MS) {
          showExpired();
          return;
        }

        currentReceiver = receiver;
        currentAmount = amount;

        maker.classList.add("hidden");
        payer.classList.remove("hidden");

        const amountText = Number(amount).toLocaleString("ko-KR");

        document.title = `${payerName}님, ${amountText}원 송금 요청`;

        document.getElementById("payTitle").textContent =
          `${payerName}님, 송금해주세요`;

        document.getElementById("payText").textContent =
          `${receiver.name}님에게 보내는 ${amountText}원 송금 요청입니다.`;

        document.getElementById("payAmount").textContent =
          `${amountText}원`;

        document.getElementById("fallbackAccount").textContent =
          `${receiver.bank} ${receiver.account}`;

        const tossUrl = makeTossUrl(amount, receiver.bank, receiver.account);
        document.getElementById("tossLink").setAttribute("href", tossUrl);
      } catch {
        alert("송금 링크가 올바르지 않습니다.");
      }
    }

    function makeLink() {
      const payerName = document.getElementById("payerName").value.trim();
      const receiverIndex = document.getElementById("receiverName").value;
      const amount = document.getElementById("amount").value.trim();

      if (!payerName || !amount) {
        alert("송금할 사람 이름과 금액을 입력해주세요.");
        return;
      }

      const amountText = Number(amount).toLocaleString("ko-KR");
      const receiver = people[Number(receiverIndex)];
      const createdAt = Date.now();
      const packed = [receiverIndex, amount, createdAt, payerName].join("|");

      window.createdLink =
        location.origin +
        location.pathname +
        "#" +
        encodeData(packed);

      window.shareTitle = `${payerName}님, ${amountText}원 송금 요청`;
      window.shareText =
        `${payerName}님에게 ${amountText}원 송금 요청이 도착했습니다. ` +
        `받는 사람은 ${receiver.name}님이며, 링크는 24시간 동안만 열립니다.`;

      const result = document.getElementById("result");
      result.classList.remove("hidden");
      result.innerHTML =
        `<strong>${payerName}님, ${amountText}원 송금 요청</strong><br>` +
        `${receiver.name}님에게 보내는 송금 링크가 만들어졌습니다.<br>` +
        `이 링크는 24시간 뒤 만료됩니다.<br><br>` +
        `${window.createdLink}`;

      document.getElementById("shareActions").classList.remove("hidden");
    }

    async function copyText(text, successMessage) {
      try {
        await navigator.clipboard.writeText(text);
        alert(successMessage);
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
          document.execCommand("copy");
          alert(successMessage);
        } catch {
          alert("복사가 안 되면 내용을 길게 눌러 직접 복사해주세요.");
        }

        textarea.remove();
      }
    }

    async function copyLink() {
      if (!window.createdLink) {
        alert("먼저 송금 링크를 만들어주세요.");
        return;
      }

      await copyText(window.createdLink, "링크가 복사되었습니다.");
    }

    async function copyAccount() {
      if (!currentReceiver) {
        alert("계좌 정보를 불러오지 못했습니다.");
        return;
      }

      await copyText(currentReceiver.account, "계좌번호가 복사되었습니다.");
    }

    async function shareLink() {
      if (!window.createdLink) {
        alert("먼저 송금 링크를 만들어주세요.");
        return;
      }

      if (navigator.share) {
        try {
          await navigator.share({
            title: window.shareTitle,
            text: window.shareText,
            url: window.createdLink
          });
        } catch {}
      } else {
        await copyLink();
      }
    }

    function toggleMoreBanks() {
      document.getElementById("moreBanks").classList.toggle("hidden");
    }

    async function openBankApp(bankKey) {
      if (!currentReceiver) {
        alert("계좌 정보를 불러오지 못했습니다.");
        return;
      }

      await copyAccount();

      const app = bankApps[bankKey];
      if (!app) return;

      let opened = false;
      const startedAt = Date.now();

      const onHidden = () => {
        opened = true;
      };

      document.addEventListener("visibilitychange", onHidden, { once: true });

      app.schemes.forEach((scheme, index) => {
        setTimeout(() => {
          if (!opened) {
            location.href = scheme;
          }
        }, index * 450);
      });

      setTimeout(() => {
        document.removeEventListener("visibilitychange", onHidden);

        if (!opened && Date.now() - startedAt < 3200) {
          alert(`${app.name} 앱이 설치되어 있지 않은 것 같습니다.`);
        }
      }, 2600);
    }

    setPerson("park");
    openPaymentPage();
  </script>
</body>
</html>
